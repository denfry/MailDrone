# ────────────────────────────────────────────────
#  MailDrone — Почта России на дронах
#  Работает на Paper, Folia и форках, версии 1.21.x и 26.x
# ────────────────────────────────────────────────

delivery:
  # Базовое время доставки (секунды), выбирается случайно в диапазоне.
  min-seconds: 30
  max-seconds: 120
  # Шанс задержки на сортировке (0.0–1.0) и доп. время за неё.
  sorting-chance: 0.20
  sorting-extra-min-seconds: 20
  sorting-extra-max-seconds: 60
  # Резерв для будущих режимов скорости (сейчас длительность задаёт время доставки).
  min-flight-seconds: 5
  max-flight-seconds: 25
  drone-speed: 8.0
  # На сколько блоков выше точек старта/финиша летит дрон.
  cruise-height: 12.0
  # Тексты статуса «на сортировке» (выбираются случайно).
  sorting-notes:
    - "Обрабатывается в сортировочном центре «Подольск-ЦЕХ-3»"
    - "Ожидает обработки в логистическом центре Внуково"
    - "Проходит таможенное оформление"
    - "Передана в сортировочный центр Казани"
    - "Временно задержана: перегрузка сортировочного узла"

cost:
  # Способ оплаты: NONE | XP_LEVELS | ITEM | VAULT (деньги; нужен Vault + эконом-плагин)
  type: XP_LEVELS
  amount: 1
  # Используется при type: ITEM
  item: EMERALD

packing:
  # Сколько рядов под предметы в меню упаковки (1–5).
  rows: 4

points:
  # Требовать рядом почтовое отделение для отправки (если отделения настроены).
  require-office: false
  # Радиус действия отделения (блоки).
  office-radius: 12.0

drone:
  body-material: GRAY_CONCRETE
  rotor-material: IRON_NUGGET
  nose-material: REDSTONE_BLOCK
  scale: 0.6
  rotor-count: 4          # число винтов (1–8)
  face-travel: true       # дрон поворачивается по курсу полёта
  particles: true
  sounds: true

storage:
  # Сколько дней хранить вручённые/возвращённые посылки перед удалением (0 — хранить всегда).
  delivered-retention-days: 7

# Сообщать игроку при входе, если в почтомате есть посылки.
notify-on-join: true

# Проверять новую версию плагина при запуске (GitHub-релизы denfry/MailDrone).
update-check: true

# Анонимная статистика bStats. Зарегистрируйте плагин на https://bstats.org
# и впишите полученный id (0 — выключено).
metrics:
  enabled: true
  plugin-id: 0
