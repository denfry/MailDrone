name: Release

# Авто-релиз по тегу вида v1.2.3:
#   git tag v1.2.3 && git push origin v1.2.3
# Workflow соберёт jar с версией из тега и опубликует GitHub-релиз с вложением.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: ./gradlew build -Pversion=${{ steps.ver.outputs.version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MailDrone ${{ github.ref_name }}
          generate_release_notes: true
          files: plugin/build/libs/MailDrone-${{ steps.ver.outputs.version }}.jar
          fail_on_unmatched_files: true
